services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    environment:
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEFAULT_MODELS=${DEFAULT_MODELS}
      - WEBUI_AUTH=true
      - ENABLE_SIGNUP=${ENABLE_SIGNUP}
    volumes:
      - open-webui:/app/backend/data
    expose:
      - "8080"

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    # Host networking so Caddy can reach the Hermes dashboard on the host's loopback
    # (127.0.0.1:9119). The dashboard binds loopback only (its own guidance: "bind 127.0.0.1
    # + tunnel"); host-net Caddy is that tunnel, with edge basic-auth in the Caddyfile. Caddy
    # binds host 80/443 directly, so the explicit ports mapping is not used in this mode.
    network_mode: host
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  open-webui:
  caddy_data:
  caddy_config:
