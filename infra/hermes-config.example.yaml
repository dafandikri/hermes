# Example ~/.hermes/config.yaml for the Hermes Agent (non-secret settings).
# Secrets (OPENROUTER_API_KEY / OPENAI_API_KEY / TELEGRAM_BOT_TOKEN) go in ~/.hermes/.env, not here.
model:
  provider: openrouter
  # One OpenRouter key reaches BOTH Hermes and OpenAI GPT-5.x. Pick a model id:
  #   nousresearch/hermes-4-70b   (on-theme, cheap)
  #   openai/gpt-5                (OpenAI's flagship via OpenRouter, needs no separate OpenAI acct)
  #   openrouter/auto             (let OpenRouter choose)
  default: nousresearch/hermes-4-70b

# Optional: cheaper model for side tasks
auxiliary:
  vision:
    provider: openrouter
    model: ~google/gemini-flash-latest

# Token-saving terminal output filter for Hermes terminal-heavy workflows.
plugins:
  enabled:
    - rtk-rewrite
