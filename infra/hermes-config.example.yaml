# Example ~/.hermes/config.yaml for the Hermes Agent (non-secret settings).
# OAuth and messaging credentials go in ~/.hermes/.env or provider dashboards, never here.
model:
  provider: openai-codex
  default: openai/gpt-5.5

compression:
  enabled: true
  codex_gpt55_autoraise: false

gateway:
  platforms:
    line:
      enabled: true

# Token-saving terminal output filter for Hermes terminal-heavy workflows.
plugins:
  enabled:
    - rtk-rewrite
